set timeout=3
set default=0

# VNL uses classic 80×25 VGA text (memory at 0xB8000), not a framebuffer.
# Without this, many real machines leave GRUB in graphics mode or hit
# "no video mode found" / "no console will be available to OS".
set gfxpayload=text
terminal_input console
terminal_output console

menuentry "VNL - Vibe Not Linux" {
    set gfxpayload=text
    multiboot2 /boot/vnl.kernel
    boot
}
