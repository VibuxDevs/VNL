set timeout=5
# Framebuffer + devfs is the default path for Xorg / compositors / DE work.
set default=1
set pager=0

# BIOS vs UEFI video handoff (see earlier grub notes).
if [ "$grub_platform" = "efi" ]; then
    set gfxmode=auto
    set gfxpayload=keep
else
    set gfxmode=text
    set gfxpayload=text
fi

terminal_input console
terminal_output console

menuentry "VNL - Vibe Not Linux" {
    search --no-floppy --file /boot/vnl.kernel --set=root
    if [ "$grub_platform" = "efi" ]; then
        set gfxpayload=keep
    else
        set gfxpayload=text
    fi
    multiboot2 /boot/vnl.kernel
    boot
}

menuentry "VNL - default: X11/DE prep (1024x768 fb + /tmp/.X11-unix)" {
    search --no-floppy --file /boot/vnl.kernel --set=root
    set gfxmode=1024x768x32
    set gfxpayload=1024x768x32
    terminal_output gfxterm
    terminal_input console
    multiboot2 /boot/vnl.kernel
    boot
}

menuentry "VNL - serial only (COM1 38400)" {
    search --no-floppy --file /boot/vnl.kernel --set=root
    serial --unit=0 --speed=38400 --word=8 --parity=no --stop=1
    terminal_input serial
    terminal_output serial
    if [ "$grub_platform" = "efi" ]; then
        set gfxpayload=keep
    else
        set gfxpayload=text
    fi
    multiboot2 /boot/vnl.kernel
    boot
}
